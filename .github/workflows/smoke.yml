name: E2E Smoke Test

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'worker/**'
      - 'scripts/smoke.sh'
      - 'scripts/smoke_test.py'
      - 'docker-compose.yml'
      - '.github/workflows/smoke.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'worker/**'
      - 'scripts/smoke.sh'
      - 'scripts/smoke_test.py'
      - 'docker-compose.yml'
      - '.github/workflows/smoke.yml'
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update -y && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Pre-install heavy worker deps (torch CPU wheel)
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only torch wheel to avoid pulling the (much larger) CUDA build.
          pip install --extra-index-url https://download.pytorch.org/whl/cpu \
            torch==2.3.1 torchaudio==2.3.1

      - name: Run smoke test
        run: bash scripts/smoke.sh

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs
          path: .smoke-logs/
          retention-days: 7
