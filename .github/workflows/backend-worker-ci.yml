name: Backend + Worker CI

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'worker/**'
      - '.github/workflows/backend-worker-ci.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'worker/**'
      - '.github/workflows/backend-worker-ci.yml'

# Dummy env so pydantic-settings validation passes during import smoke tests.
# These values are NOT used to connect anywhere — the smoke test only verifies
# that modules import. Real values are provided by docker-compose / k8s secrets
# at runtime.
env:
  DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci
  REDIS_URL: redis://localhost:6379/0
  CELERY_BROKER_URL: redis://localhost:6379/1
  CELERY_RESULT_BACKEND: redis://localhost:6379/2
  S3_ENDPOINT: http://localhost:9000
  S3_ACCESS_KEY: ci-dummy
  S3_SECRET_KEY: ci-dummy
  S3_BUCKET: ci-bucket
  DASHSCOPE_API_KEY: ci-dummy

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Import smoke test
        run: python -c "import app.main; print('backend import ok')"

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install CPU-only torch
        # Avoid pulling the 2GB CUDA wheel that PyPI defaults to on Linux x86_64.
        run: |
          python -m pip install --upgrade pip
          pip install --extra-index-url https://download.pytorch.org/whl/cpu \
            torch==2.3.1 torchaudio==2.3.1
      - name: Install worker
        run: pip install -e .
      - name: Import smoke test
        run: python -c "import worker.tasks; print('worker import ok')"
