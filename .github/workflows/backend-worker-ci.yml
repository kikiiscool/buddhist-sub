name: Backend + Worker CI

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'worker/**'
      - '.github/workflows/backend-worker-ci.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'worker/**'
      - '.github/workflows/backend-worker-ci.yml'

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Import smoke test
        run: python -c "import app.main; print('backend import ok')"

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install worker
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Import smoke test
        run: python -c "import worker.tasks; print('worker import ok')"
