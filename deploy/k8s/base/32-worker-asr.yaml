# GPU-backed ASR worker — TEMPLATE / DISABLED BY DEFAULT.
#
# To use:
#   1. Refactor worker/worker/tasks.py so `transcribe` is enqueued as its own
#      task (currently run_job orchestrates everything in one task — splitting
#      the queue won't actually help until that refactor lands).
#   2. Add Celery task routing so transcribe → "asr" queue, others → "default".
#   3. Build the worker image with --build-arg WHISPER_EXTRA=faster against a
#      CUDA-capable base image, push, then update the image: ref below.
#   4. Remove the `# DISABLED:` lines and `kubectl apply` this file.
#
# Until step 1-3 are done, applying this manifest will spin up an idle worker
# that gets the same generic celery queue as worker/ — duplicating work
# without GPU benefit. Hence disabled.

