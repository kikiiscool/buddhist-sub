# DISABLED:           operator: Exists
# DISABLED:           effect: NoSchedule
# DISABLED:       containers:
# DISABLED:         - name: worker-asr
# DISABLED:           image: ghcr.io/REPLACE_OWNER/buddhist-sub-worker-gpu:latest
