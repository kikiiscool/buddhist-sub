# DISABLED:   namespace: buddhist-sub
# DISABLED:   labels: {app: worker-asr}
# DISABLED: spec:
# DISABLED:   replicas: 1
# DISABLED:   selector: {matchLabels: {app: worker-asr}}
# DISABLED:   template:
# DISABLED:     metadata: {labels: {app: worker-asr}}
# DISABLED:     spec:
# DISABLED:       nodeSelector:
# DISABLED:         nvidia.com/gpu.product: "NVIDIA-A10"   # adjust to your fleet
# DISABLED:       tolerations:
