---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: buddhist-sub
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: buddhist-sub
  labels:
    app: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Apply DB migrations exactly once per rollout, before any backend
      # replica starts serving. Backend containers are configured with
      # RUN_MIGRATIONS_ON_START=0 (in the ConfigMap) to avoid races.
      initContainers:
        - name: migrate
          image: ghcr.io/REPLACE_OWNER/buddhist-sub-backend:latest
          imagePullPolicy: IfNotPresent
          workingDir: /app
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef: {name: buddhist-sub-config}
            - secretRef:    {name: buddhist-sub-secrets}
          resources:
            requests: {cpu: "100m", memory: "256Mi"}
            limits:   {cpu: "1",    memory: "1Gi"}
      containers:
        - name: backend
          image: ghcr.io/REPLACE_OWNER/buddhist-sub-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - {containerPort: 8000, name: http}
          envFrom:
            - configMapRef: {name: buddhist-sub-config}
            - secretRef:    {name: buddhist-sub-secrets}
          readinessProbe:
            httpGet: {path: /healthz, port: 8000}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /healthz, port: 8000}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: {cpu: "200m", memory: "512Mi"}
            limits:   {cpu: "2",    memory: "2Gi"}
