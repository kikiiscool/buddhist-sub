# Self-hosted object storage. For production prefer S3 / GCS / R2 / Aliyun OSS;
# in that case delete this file and set S3_ENDPOINT / S3_BUCKET / S3_REGION in
# the ConfigMap to the cloud values.
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: buddhist-sub
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: buddhist-sub
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - {name: api, containerPort: 9000}
            - {name: console, containerPort: 9001}
          env:
            - name: MINIO_ROOT_USER
              valueFrom: {secretKeyRef: {name: buddhist-sub-secrets, key: S3_ACCESS_KEY}}
            - name: MINIO_ROOT_PASSWORD
              valueFrom: {secretKeyRef: {name: buddhist-sub-secrets, key: S3_SECRET_KEY}}
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet: {path: /minio/health/ready, port: 9000}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /minio/health/live, port: 9000}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: {cpu: "100m", memory: "256Mi"}
            limits:   {cpu: "2",    memory: "2Gi"}
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Gi
---
# One-shot Job to create the bucket if missing.
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-init
  namespace: buddhist-sub
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          env:
            - name: S3_ACCESS_KEY
              valueFrom: {secretKeyRef: {name: buddhist-sub-secrets, key: S3_ACCESS_KEY}}
            - name: S3_SECRET_KEY
              valueFrom: {secretKeyRef: {name: buddhist-sub-secrets, key: S3_SECRET_KEY}}
            - name: S3_BUCKET
              valueFrom: {configMapKeyRef: {name: buddhist-sub-config, key: S3_BUCKET}}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              until mc alias set local http://minio:9000 "$S3_ACCESS_KEY" "$S3_SECRET_KEY"; do
                sleep 2
              done
              mc mb -p "local/$S3_BUCKET" || true
              echo "bucket $S3_BUCKET ready"
