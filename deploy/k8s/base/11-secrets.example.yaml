# SAMPLE secrets — copy to 11-secrets.yaml (gitignored), fill in real values,
# kubectl apply. NEVER commit real keys.
#
# Tip: in production prefer external-secrets / SOPS / sealed-secrets — this
# example is just to document the keys the application expects.
apiVersion: v1
kind: Secret
metadata:
  name: buddhist-sub-secrets
  namespace: buddhist-sub
type: Opaque
stringData:
  POSTGRES_PASSWORD: "REPLACE_ME_pg_pw"
  # asyncpg URL used by backend at runtime; alembic migration container
  # reads the same value and rewrites +asyncpg → +psycopg2 internally.
  DATABASE_URL: "postgresql+asyncpg://buddhist:REPLACE_ME_pg_pw@postgres:5432/buddhist_sub"

  S3_ACCESS_KEY: "REPLACE_ME_s3_ak"
  S3_SECRET_KEY: "REPLACE_ME_s3_sk"

  # OpenAI-compatible key for Qwen + text-embedding-v3 (DashScope endpoint).
  DASHSCOPE_API_KEY: "sk-REPLACE_ME"

  # Optional fallback ASR provider.
  OPENAI_API_KEY: ""
